# ===========================================================================
# Privacy-Preserving RAG Agent — central configuration.
# Paths are resolved relative to this file unless absolute.
# Override the active file with the RAG_CONFIG env var.
# Secrets (ANTHROPIC_API_KEY) come from the environment, never from here.
# ===========================================================================

log_level: INFO

paths:
  documents_dir: ../data/documents      # source corpus (PDF / md / txt)
  chroma_dir: ../data/chroma            # persistent vector store
  audit_log: ../data/audit/audit.jsonl  # append-only, hash-chained audit trail

ingest:
  collection_name: research
  chunk_size: 1000                      # characters per chunk
  chunk_overlap: 150

llm:
  provider: anthropic
  model: claude-3-5-sonnet-20241022     # ANTHROPIC_API_KEY read from env
  temperature: 0.0
  max_tokens: 1024

agent:
  max_iterations: 6
  retrieval_k: 4                        # chunks fetched per retrieval
  min_relevance: 0.25                   # below this top-1 score -> "I don't know"
  enable_query_rewrite: true            # deterministic query normalisation
  system_prompt: >
    You are a research assistant for Md Minhazur Rahman's work on real-time
    retail demand forecasting with synthetic data. Answer ONLY from retrieved
    context or tool results; if unknown, say so. Never invent citations. All
    data you discuss is synthetic by design — never claim access to real
    customer or personal data.

forecasting:
  api_url: http://localhost:8000        # Project 1 inference API
  timeout_seconds: 10

privacy:
  fail_closed: true                     # block on uncertainty
  max_output_chars: 8000
  dp_enabled: false                     # Laplace output-perturbation on forecasts
  dp_epsilon: 1.0                       # smaller epsilon -> more noise / privacy
  dp_clip_max: 1000.0                   # clip bound = output sensitivity

api:
  host: 0.0.0.0
  port: 8080
